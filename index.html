<!DOCTYPE html>
<html>
  <head>
    <title>Travel Decision Engine</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
  </head>

  <body style="font-family: sans-serif; text-align:center; margin-top:30vh;">

    <h1>Travel Decision Engine</h1>

    <button
      style="font-size:24px; padding:20px;"
      onclick="getLocation()">
      Cosa faccio ora?
    </button>

    <p id="status" style="margin-top:30px; font-size:18px;"></p>

    <script>
      function getLocation() {
        const status = document.getElementById("status");
        status.innerText = "Sto cercando la tua posizione...";

        if (!navigator.geolocation) {
          status.innerText = "Geolocalizzazione non supportata";
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (position) => {
            const lat = position.coords.latitude.toFixed(5);
            const lon = position.coords.longitude.toFixed(5);
            status.innerText = "Sei qui:\nLat: " + lat + " | Lon: " + lon;
          },
          (error) => {
            status.innerText =
              "Errore geolocalizzazione (" + error.code + "): " +
              error.message;
          }
        );
      }
    </script>

  </body>
</html>
