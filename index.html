<!DOCTYPE html>
<html>
  <head>
    <title>Travel Decision Engine</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
  </head>

  <body style="font-family: sans-serif; text-align:center; margin-top:30vh;">

    <h1>Travel Decision Engine</h1>

    <button
      style="font-size:24px; padding:20px;"
      onclick="getLocation()">
      Cosa faccio ora?
    </button>

    <p id="status" style="margin-top:30px; font-size:18px;"></p>

<script>
  function getLocation() {
    const status = document.getElementById("status");
    status.innerText = "Sto cercando la tua posizione...";

    if (!navigator.geolocation) {
      status.innerText = "Geolocalizzazione non supportata";
      return;
    }

    navigator.geolocation.getCurrentPosition(
      (position) => {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

        if (isInMilano(lat, lon)) {
          const suggestions = getSuggestionsForMilano();
          const best = suggestions.sort((a, b) => b.score - a.score)[0];
          showSuggestion(best);
        } else {
          status.innerHTML = `
            📍 Posizione rilevata<br><br>
            Lat: ${lat.toFixed(4)}<br>
            Lon: ${lon.toFixed(4)}<br><br>
            ⚠️ Al momento so darti suggerimenti solo per <strong>Milano</strong>.
          `;
        }
      },
      (error) => {
        status.innerText =
          "Errore geolocalizzazione (" + error.code + "): " +
          error.message;
      }
    );
  }

  function isInMilano(lat, lon) {
    return (
      lat > 45.40 && lat < 45.55 &&
      lon > 9.10  && lon < 9.30
    );
  }

function getSuggestionsForMilano() {
  return [
    {
      title: "Museo del Novecento",
      score: 8,
      reasons: [
        "Centro città",
        "Al coperto",
        "Perfetto per 1–2 ore"
      ]
    },
    {
      title: "Pinacoteca di Brera",
      score: 7,
      reasons: [
        "Arte classica",
        "Zona piacevole",
        "Visita più lunga"
      ]
    },
    {
      title: "Passeggiata ai Navigli",
      score: 5,
      reasons: [
        "All’aperto",
        "Piacevole al tramonto",
        "Meglio con bel tempo"
      ]
    }
  ];
}


  function showSuggestion(suggestion) {
    const status = document.getElementById("status");
    status.innerHTML = `
      📍 Sei a <strong>Milano</strong><br><br>
      ✅ <strong>Suggerimento ora:</strong><br>
      <em>${suggestion.title}</em><br><br>
      <small>
        ${suggestion.reasons.map(r => "• " + r).join("<br>")}
      </small>
    `;
  }
</script>
  </body>
</html>
