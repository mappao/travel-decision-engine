<!DOCTYPE html>
<html>
  <head>
    <title>Travel Decision Engine</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
  </head>

  <body style="font-family: sans-serif; text-align:center; margin-top:30vh;">

    <h1>Travel Decision Engine</h1>

    <div style="margin-bottom:20px; font-size:16px;">
      <strong>I tuoi interessi:</strong><br>
    
      <label>
        <input type="checkbox" id="culture">
        Cultura / Musei
      </label><br>
    
      <label>
        <input type="checkbox" id="outdoor">
        Outdoor / Passeggiate
      </label><br>
    
      <label>
        <input type="checkbox" id="noCrowds">
        Preferisco evitare la folla
      </label>
    </div>
    
    <button
      style="font-size:24px; padding:20px;"
      onclick="getLocation()">
      Cosa faccio ora?
    </button>

    <p id="status" style="margin-top:30px; font-size:18px;"></p>

<script>
  function getUserProfile() {
    return {
      culture: document.getElementById("culture").checked,
      outdoor: document.getElementById("outdoor").checked,
      noCrowds: document.getElementById("noCrowds").checked
    };
  }
   
  function getLocation() {
    const status = document.getElementById("status");

    // Leggi il profilo utente dalla UI
    const profile = getUserProfile();

    status.innerText = "Sto cercando la tua posizione...";

    if (!navigator.geolocation) {
      status.innerText = "Geolocalizzazione non supportata dal browser";
      return;
    }

    navigator.geolocation.getCurrentPosition(
      (position) => {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

        // Controllo area supportata (Milano)
        if (isInMilano(lat, lon)) {

          // Recupero meteo reale
          getWeather(lat, lon).then(weather => {

            // Decision Engine: ritorna più suggerimenti
            const suggestions = getSuggestionsForMilano(weather, profile);

            // Ordina per score decrescente
            const best = suggestions.sort(
              (a, b) => b.score - a.score
            )[0];

            // Mostra il suggerimento scelto
            showSuggestion(best, weather);

          }).catch(() => {
            status.innerText = "Errore nel recupero del meteo";
          });

        } else {
          // Caso fuori Milano (UX gentile)
          status.innerHTML = `
            📍 Posizione rilevata<br><br>
            Lat: ${lat.toFixed(4)}<br>
            Lon: ${lon.toFixed(4)}<br><br>
            ⚠️ Al momento so darti suggerimenti solo per
            <strong>Milano</strong>.
          `;
        }
      },
      (error) => {
        status.innerText =
          "Errore geolocalizzazione (" +
          error.code + "): " +
          error.message;
      }
    );
  }

  function isInMilano(lat, lon) {
    return (
      lat > 45.40 && lat < 45.55 &&
      lon > 9.10  && lon < 9.30
    );
  }

  async function getWeather(lat, lon) {
    const url =
      `https://api.open-meteo.com/v1/forecast` +
      `?latitude=${lat}&longitude=${lon}` +
      `&current_weather=true`;

    const response = await fetch(url);
    const data = await response.json();

    return data.current_weather;
  }

function getSuggestionsForMilano(weather, profile) {
  const isRain =
    weather.weathercode >= 51 && weather.weathercode <= 67;

  return [
    {
      title: "Museo del Novecento",
      indoor: true,
      crowdRisk: "high",
      score:
        6 +
        (profile.culture ? 3 : 0) +
        (profile.noCrowds ? -2 : 0) +
        (isRain ? 2 : 0),
      reasons: [
        "Esperienza culturale",
        "Al coperto",
        profile.noCrowds ? "Può essere affollato" : null,
        isRain ? "Ottima scelta con pioggia" : null
      ]
    },
    {
      title: "Passeggiata ai Navigli",
      indoor: false,
      crowdRisk: "medium",
      score:
        5 +
        (profile.outdoor ? 3 : 0) -
        (isRain ? 3 : 0),
      reasons: [
        "Atmosfera rilassata",
        "All’aperto",
        isRain ? "Meno ideale con pioggia" : "Perfetta con bel tempo"
      ]
    }
  ];
}
  
function showSuggestion(suggestion, weather) {
  const status = document.getElementById("status");
  status.innerHTML = `
    📍 Sei a <strong>Milano</strong><br>
    🌦️ Meteo attuale: ${weather.temperature}°C
    <br><small>(aggiornato alle ${new Date().toLocaleTimeString()})</small>
    <br><br>

    ✅ <strong>Suggerimento ora:</strong><br>
    <em>${suggestion.title}</em><br><br>

    <small>
      ${suggestion.reasons.map(r => "• " + r).join("<br>")}
    </small>
  `;
}</script>
  </body>
</html>
