<!DOCTYPE html>
<html>
  <head>
    <title>Travel Decision Engine</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
  </head>

  <body style="font-family: sans-serif; text-align:center; margin-top:30vh;">

    <h1>Travel Decision Engine</h1>

    <button
      style="font-size:24px; padding:20px;"
      onclick="getLocation()">
      Cosa faccio ora?
    </button>

    <p id="status" style="margin-top:30px; font-size:18px;"></p>

<script>
  function getLocation() {
    const status = document.getElementById("status");
    status.innerText = "Sto cercando la tua posizione...";

    if (!navigator.geolocation) {
      status.innerText = "Geolocalizzazione non supportata";
      return;
    }

    navigator.geolocation.getCurrentPosition(
      (position) => {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

    if (isInMilano(lat, lon)) {
      getWeather(lat, lon).then(weather => {
        const suggestions = getSuggestionsForMilano(weather);
        const best = suggestions.sort((a, b) => b.score - a.score)[0];
        showSuggestion(best, weather);
      });
    }
    else {
          status.innerHTML = `
            📍 Posizione rilevata<br><br>
            Lat: ${lat.toFixed(4)}<br>
            Lon: ${lon.toFixed(4)}<br><br>
            ⚠️ Al momento so darti suggerimenti solo per <strong>Milano</strong>.
          `;
        }
      },
      (error) => {
        status.innerText =
          "Errore geolocalizzazione (" + error.code + "): " +
          error.message;
      }
    );
  }

  function isInMilano(lat, lon) {
    return (
      lat > 45.40 && lat < 45.55 &&
      lon > 9.10  && lon < 9.30
    );
  }

  async function getWeather(lat, lon) {
    const url =
      `https://api.open-meteo.com/v1/forecast` +
      `?latitude=${lat}&longitude=${lon}` +
      `&current_weather=true`;

    const response = await fetch(url);
    const data = await response.json();

    return data.current_weather;
  }

function getSuggestionsForMilano(weather) {
  const isRain =
    weather.weathercode >= 51 && weather.weathercode <= 67;

    return [
      {
        title: "Museo del Novecento",
        indoor: true,
        score: 8 + (isRain ? 2 : 0),
        reasons: [
          "Centro città",
          "Al coperto",
          isRain ? "Ideale con la pioggia" : "Sempre valido"
        ]
      },
      {
        title: "Pinacoteca di Brera",
        indoor: true,
        score: 7 + (isRain ? 2 : 0),
        reasons: [
          "Arte classica",
          "Ambiente tranquillo",
          isRain ? "Ottima scelta con pioggia" : "Visita piacevole"
        ]
      },
      {
        title: "Passeggiata ai Navigli",
        indoor: false,
        score: 6 - (isRain ? 3 : 0),
        reasons: [
          "Atmosfera suggestiva",
          "All’aperto",
          isRain ? "Sconsigliata con pioggia" : "Perfetta con bel tempo"
        ]
      }
    ];
  }
  
function showSuggestion(suggestion, weather) {
  const status = document.getElementById("status");
  status.innerHTML = `
    📍 Sei a <strong>Milano</strong><br>
    🌦️ Meteo attuale: ${weather.temperature}°C
    <br><small>(aggiornato alle ${new Date().toLocaleTimeString()})</small>
    <br><br>

    ✅ <strong>Suggerimento ora:</strong><br>
    <em>${suggestion.title}</em><br><br>

    <small>
      ${suggestion.reasons.map(r => "• " + r).join("<br>")}
    </small>
  `;
}</script>
  </body>
</html>
